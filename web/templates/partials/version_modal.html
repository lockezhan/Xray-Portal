<!-- 版本详情弹窗（直接挂在 body 下，避免被 backdrop-filter 祖先截断） -->
<div id="version-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-subtitle" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 hidden p-4 flex items-center justify-center">
    <div class="modal-card w-full max-w-2xl bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col modal-card-inner">
        <div class="flex items-start justify-between p-6 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur">
            <div>
                <div id="modal-title" class="text-xl font-bold text-slate-800 dark:text-slate-100">版本详情</div>
                <div id="modal-subtitle" class="text-sm text-slate-500 dark:text-slate-400 mt-1"></div>
            </div>
            <button onclick="closeVersionModal()" class="text-slate-400 hover:text-slate-700 dark:text-slate-500 dark:hover:text-slate-200 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto space-y-4 modal-scroll flex-1 min-h-[30vh] max-h-[60vh] md:max-h-[70vh]" id="modal-body"></div>

        <div class="p-4 border-t border-slate-200 dark:border-slate-800 flex justify-end bg-slate-50/80 dark:bg-slate-900/60 sticky bottom-0">
            <button onclick="closeVersionModal()" class="px-4 py-2 rounded-xl text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-emerald-300 dark:hover:border-emerald-600 transition-colors">关闭</button>
        </div>
    </div>
</div>
